<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description"
      content="the contact page for a rafting company, displaying information on the company and how to contact the company.">
    <meta name="author" content="Gideon David Wells">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header class="grid">
        <img src="images/z-wwr-blue.jpg" alt="White Water Rafting logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main class="contact-main">
        <section class="contact-info">
            <h2>White Water Rafting</h2>
            <p>123 Main River Street<br>Kolob, California</p>
            <p>+1 999 999 9999<br>info@whitewater.com</p>
        </section>
        <div class="contact-layout">
            <section class="map">
                <h2>See where your adventure is</h2>
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d36135.74287668465!2d-116.05218433897582!3d44.50467618610443!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x54a60664a71a0729%3A0x4c3a648cde771697!2sCascade%2C%20ID%2083611!5e0!3m2!1sen!2sus!4v1780754572343!5m2!1sen!2sus"
                  width="600" height="450" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </section>
            <section class="contact-form">
                <h2>We love to hearing from you</h2>
                <form>
                    <div class="input-row">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" placeholder="Type here...">
                    </div>
                    <div class="input-row">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" placeholder="Type here...">
                    </div>
                    <div class="purpose-row">
                        <label class="purpose-title">Message Purpose:</label>
                        <div class="purpose-options">
                            <label>
                                <input id="Genreral_Inquiry" type="radio" name="purpose"
                                  value="general">
                                General Inquiry
                            </label>
                            <label>
                                <input id="Reservation_Question" type="radio" name="purpose"
                                  value="reservation">
                                Reservation Question
                            </label>
                            <label>
                                <input id="Website_Suggestion" type="radio" name="purpose"
                                  value="suggestion">
                                Website Suggestion
                            </label>
                        </div>
                    </div>

                    <label for="message">Message:</label>
                    <textarea id="message" name="message" placeholder="Type here..."></textarea>

                    <label for="newsletter">
                        <input type="checkbox" id="newsletter" name="newsletter">
                        Please subscribe me to the monthly newsletter
                    </label>

                    <button type="submit">Get in Touch</button>
                </form>
            </section>
        </div>

        <section class="employees">
            <h1>We Are Here to Serve You</h1>
            <div class="profiles">
                <figure class="spacer">
                    <img src="images/guide_a.jpg" alt="Profile photo of Riley">
                    <figcaption>Riley</figcaption>
                </figure>
                <figure class="spacer">
                    <img src="images/guide_b.jpg" alt="Profile photo of Sam">
                    <figcaption>Sam</figcaption>
                </figure>
                <figure class="spacer">
                    <img src="images/guide_c.jpg" alt="Profile photo of Alex">
                    <figcaption>Alex</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>©2026 🐉Gideon David Wells🐺 Indiana, U.S.A</p>
        <nav class="socialmedia">
            <a href="https://www.youtube.com">
                <img src="images/youtube-square.svg" alt="Youtube Icon">
            </a>
            <a href="https://www.facebook.com">
                <img src="images/facebook-square.svg" alt="Facebook Icon">
            </a>
            <a href="https://www.twitter.com">
                <img src="images/twitter.png" alt="Twitter Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
