<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Quiz Form</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <main>
        <h1>✅ Basic HTML and CSS Quiz</h1>
        <form>
            <div class="quiz-item">
                <label for="q1">1. What does CSS stand for.</label>
                <input type="text" id="q1" name="q1">
            </div>
            <div class="quiz-item">
                <label for="q2">2. How are id and class attributes selected in CSS</label>
                <textarea id="q2" name="q2"></textarea>
            </div>
            <div class="quiz-item">
                <label for="q3">3. Which of the following is a valid CSS comment?</label>
                <select id="q3" name="q3">
                    <option value="" Select:disabled>
                        </Select:disabled>
                    </option>
                    <option value="a">A. &lt;!--Thus is a comment --&gt;</option>
                    <option value="b">B. /* This is a comment */</option>
                    <option value="c">C. // this is a comment //</option>
                </select>
            </div>
            <div class="quiz-item">
                <label for="q4">4. </label>
                <code>margin: 10px 5px 15px</code>
                <input type="number" id="q4" name="q4">
            </div>
        </form>
    </main>
</body>

</html>
